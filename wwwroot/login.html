<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Semiconductor Strategy Pulse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body class="auth-page">
    <div class="radial-glow"></div>
    <div class="auth-container-wrapper">
        <div class="auth-logo">
            <span class="brand-pulse-dot"></span>
            <h1>SEMICONDUCTOR STRATEGY PULSE</h1>
        </div>
        
        <div class="auth-card">
            <h2>SIGN IN</h2>
            <p class="auth-subtitle">Access the strategic metrics dashboard</p>
            
            <form id="login-page-form" class="auth-form-standalone">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input type="email" id="login-email" placeholder="e.g. admin@pulse.com" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="glow-button">
                    <span>SIGN IN</span>
                </button>
                
                <div id="login-error" class="alert-box error hide"></div>
            </form>
            
            <div class="auth-footer-links">
                <span>Don't have an account? <a href="register.html">Sign Up</a></span>
                <span><a href="/" class="back-link">&larr; Back to Dashboard</a></span>
            </div>
        </div>
    </div>
    
    <script>
        document.getElementById('login-page-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const errorBox = document.getElementById('login-error');
            errorBox.classList.add('hide');
            
            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || 'Invalid credentials');
                
                window.location.href = '/';
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove('hide');
            }
        });
    </script>
</body>
</html>
